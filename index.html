<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLAM | إمبراطورية القصص</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">SLAM</div>
        <input type="text" class="search-bar" placeholder="بحث عن #هاشتاج...">
        <button id="login-btn" style="background:white; color:#ff4b91; border:none; padding:5px 15px; border-radius:15px; cursor:pointer; font-weight:bold;">دخول بجوجل</button>
    </nav>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="mini-profile">
                <img src="https://via.placeholder.com/80" id="user-img" class="profile-img">
                <h3 id="user-name">زائر</h3>
                <p id="user-bio">سجل دخولك لتبدأ القصة</p>
            </div>
            <nav class="menu">
                <button onclick="location.reload()">🏠 الرئيسية</button>
            </nav>
        </aside>

  <main class="feed">
    <div class="publish-box" id="publish-area" style="display:none;">
        <textarea id="post-input" placeholder="اكتب قصتك.. #SLAM 🖤🤍"></textarea>
        <div class="actions" style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
            <div class="upload-icons">
                <label for="file-input" style="cursor: pointer; font-size: 20px;">🖼️ / 🎥</label>
                <input type="file" id="file-input" accept="image/*,video/*" style="display: none;">
            </div>
            <button class="post-btn" id="publish-btn">نشر الآن 🚀</button>
        </div>
        <div id="file-preview" style="margin-top: 10px; max-width: 100px;"></div>
    </div>

    <div class="tabs" style="display: flex; gap: 20px; margin-bottom: 15px; border-bottom: 2px solid #ffdae9;">
        <button onclick="showAll()" style="background:none; border:none; color:#ff4b91; font-weight:bold; cursor:pointer;">🌍 العام</button>
        <button onclick="showFriends()" style="background:none; border:none; color:#666; cursor:pointer;">👥 الأصدقاء</button>
    </div>

    <div id="posts-container"></div>
</main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
