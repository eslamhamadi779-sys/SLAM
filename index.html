<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLAM | إمبراطورية الهاشمي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="showSection('feed')">SLAM 🖤🤍</div>
        <input type="text" class="search-bar" placeholder="بحث عن أشخاص أو #هاشتاج...">
        <div class="nav-icons">
            <button id="login-btn">دخول بجوجل</button>
        </div>
    </nav>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="mini-profile" onclick="showSection('profile')">
                <img src="https://via.placeholder.com/80" id="user-img" class="profile-img">
                <h3 id="user-name">زائر</h3>
                <p id="user-bio">جاري تحميل البايو...</p>
            </div>
            <nav class="menu">
                <button onclick="showSection('feed')">🏠 الرئيسية (العام)</button>
                <button onclick="showSection('profile')">👤 صفحتي الشخصية</button>
                <button onclick="showSection('messages')">💬 الرسائل الخاصّة</button>
                <button onclick="showSection('groups')">👨‍👩‍👧‍👦 المجموعات والصفحات</button>
                <button onclick="showSection('settings')">⚙️ الإعدادات</button>
            </nav>
        </aside>

        <main class="content-area">
            
            <section id="feed-section" class="app-section">
                <div class="publish-box" id="publish-area">
                    <textarea id="post-input" placeholder="ماذا يدور في ذهنك يا إمبراطور؟ #SLAM"></textarea>
                    <div class="actions">
                        <label for="file-input">🖼️/🎥</label>
                        <input type="file" id="file-input" style="display:none">
                        <button class="post-btn" id="publish-btn">نشر الآن 🚀</button>
                    </div>
                </div>
                <div id="posts-container"></div>
            </section>

            <section id="profile-section" class="app-section" style="display:none">
                <div class="profile-header">
                    <img src="" id="big-profile-img" class="big-img">
                    <h2 id="profile-full-name">الإسم</h2>
                    <textarea id="bio-input" placeholder="اكتب بايو يعبر عنك..."></textarea>
                    <button class="save-btn" onclick="saveBio()">حفظ البايو 💾</button>
                </div>
                <div id="my-posts-container"></div>
            </section>

            <section id="messages-section" class="app-section" style="display:none">
                <h2>💬 صندوق الوارد</h2>
                <div class="msg-list">قريباً: شات مباشر مع الأصدقاء...</div>
            </section>

        </main>
    </div>

    <footer class="footer">
        جميع الحقوق الملكية والفكرية محفوظة للمهندس إسلام الهاشمي © 2026 🖤🤍
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
